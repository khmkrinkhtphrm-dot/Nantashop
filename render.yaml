services:
  # API Server (Backend)
  - type: web
    name: nantashop-api
    runtime: node
    buildCommand: pnpm install && pnpm build
    startCommand: pnpm start
    rootDir: artifacts/api-server
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: PORT
        value: "5000"
      - key: NODE_VERSION
        value: 20
      - key: NODE_ENV
        value: production

  # Frontend (Static Site)
  - type: static
    name: nantashop-web
    buildCommand: npm install -g pnpm && pnpm install && PORT=5000 BASE_PATH=/ pnpm build
    publishDir: artifacts/game-shop/dist/public
    envVars:
      - key: VITE_API_URL
        sync: false
      - key: PORT
        value: "5000"
      - key: BASE_PATH
        value: "/"
      - key: NODE_VERSION
        value: 20
      - key: NODE_ENV
        value: production
